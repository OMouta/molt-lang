name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# One deployment at a time; cancel any in-progress run for the same branch.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      # Go is needed to run cmd/docgen
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Generate docs (builtins + examples)
        run: go run ./cmd/docgen

      # Node is needed for VitePress
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install VitePress
        run: npm ci
        working-directory: docs

      - name: Build site
        run: npm run docs:build
        working-directory: docs

      - uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
